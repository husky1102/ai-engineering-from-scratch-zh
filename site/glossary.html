  <style>
    .glossary-page {
      padding: 100px 0 80px;
      min-height: 100vh;
    }

    .glossary-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .glossary-header h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      margin-bottom: 8px;
    }

    .glossary-header p {
      color: var(--text-muted);
      font-size: 1.1rem;
    }

    .glossary-search-wrap {
      max-width: 500px;
      margin: 0 auto 40px;
      position: relative;
    }

    .glossary-search {
      width: 100%;
      font-family: var(--font-body);
      font-size: 1.1rem;
      padding: 14px 20px;
      background: var(--bg-surface);
      border: 2px solid var(--border);
      border-radius: 0;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .glossary-search::placeholder {
      color: var(--text-muted);
    }

    .glossary-search:focus {
      border-color: var(--accent);
    }

    .glossary-search:focus-visible {
      outline: 2px solid var(--blueprint);
      outline-offset: 2px;
    }

    .glossary-count {
      text-align: center;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    .glossary-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-width: 800px;
      margin: 0 auto;
    }

    .glossary-card {
      background: var(--bg-surface);
      border: 2px solid var(--border);
      border-radius: 0;
      padding: 24px;
      box-shadow: var(--shadow-hard);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .glossary-card:hover {
      transform: translate(-2px, -2px);
      box-shadow: var(--shadow-hard-lg);
    }

    .glossary-term {
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 1.3rem;
      color: var(--accent);
      margin-bottom: 12px;
    }

    .glossary-row {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }

    .glossary-col {
      flex: 1;
      min-width: 200px;
    }

    .glossary-col-label {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .glossary-col-says {
      color: var(--text-muted);
      font-size: 0.95rem;
      font-style: italic;
    }

    .glossary-col-means {
      color: var(--text);
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .glossary-empty {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-muted);
      font-size: 1.1rem;
    }

    @media (max-width: 768px) {
      .glossary-page {
        padding: 80px 0 48px;
      }

      .glossary-row {
        flex-direction: column;
        gap: 12px;
      }

      .glossary-card {
        padding: 18px 16px;
      }
    }
  </style>

  <script>
    (function () {
      var root = document.documentElement;
      var stored = localStorage.getItem('theme');
      if (stored) {
        root.setAttribute('data-theme', stored);
      } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        root.setAttribute('data-theme', 'dark');
      } else {
        root.setAttribute('data-theme', 'light');
      }

      function updateIcon() {
        var icon = document.getElementById('themeIcon');
        if (!icon) return;
        var theme = root.getAttribute('data-theme');
        icon.textContent = theme === 'light' ? '☾' : '☼';
        var btn = document.getElementById('themeToggle');
        if (btn) {
          btn.setAttribute('aria-label', theme === 'light' ? '切换到深色模式' : '切换到浅色模式');
          btn.setAttribute('title', theme === 'light' ? '切换到深色模式' : '切换到浅色模式');
        }
      }

      updateIcon();

      document.addEventListener('DOMContentLoaded', function () {
        updateIcon();

        var btn = document.getElementById('themeToggle');
        if (btn) {
          btn.addEventListener('click', function () {
            var next = root.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            root.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            updateIcon();
          });
        }

        var searchInput = document.getElementById('glossarySearch');
        var listEl = document.getElementById('glossaryList');
        var countEl = document.getElementById('glossaryCount');

        function escapeHtml(str) {
          var div = document.createElement('div');
          div.textContent = str;
          return div.innerHTML;
        }

        function renderGlossary(filter) {
          var terms = GLOSSARY;
          if (filter) {
            var q = filter.toLowerCase();
            terms = terms.filter(function (t) {
              return t.term.toLowerCase().indexOf(q) !== -1 ||
                t.says.toLowerCase().indexOf(q) !== -1 ||
                t.means.toLowerCase().indexOf(q) !== -1;
            });
          }

          countEl.textContent = terms.length + ' of ' + GLOSSARY.length + ' terms';

          if (terms.length === 0) {
            listEl.innerHTML = '<div class="glossary-empty">No terms match your search.</div>';
            return;
          }

          var html = '';
          for (var i = 0; i < terms.length; i++) {
            var t = terms[i];
            html += '<div class="glossary-card">';
            html += '<div class="glossary-term">' + escapeHtml(t.term) + '</div>';
            html += '<div class="glossary-row">';
            html += '<div class="glossary-col">';
            html += '<div class="glossary-col-label">What people say</div>';
            html += '<div class="glossary-col-says">"' + escapeHtml(t.says) + '"</div>';
            html += '</div>';
            html += '<div class="glossary-col">';
            html += '<div class="glossary-col-label">What it actually means</div>';
            html += '<div class="glossary-col-means">' + escapeHtml(t.means) + '</div>';
            html += '</div>';
            html += '</div>';
            html += '</div>';
          }
          listEl.innerHTML = html;
        }

        // Support ?q= deep-links from the command palette and external sources.
        // Pre-populate the search box and filter to the matching term so the
        // user lands directly on the definition rather than the full list.
        var urlQ = '';
        try { urlQ = new URLSearchParams(window.location.search).get('q') || ''; } catch (_) {}
        if (urlQ && searchInput) {
          searchInput.value = urlQ;
        }

        renderGlossary(urlQ);

        if (searchInput) {
          searchInput.addEventListener('input', function () {
            renderGlossary(searchInput.value.trim());
          });
        }
      });
    })();
  </script>
<script defer src="https://va.vercel-scripts.com/v1/script.js"></script>
