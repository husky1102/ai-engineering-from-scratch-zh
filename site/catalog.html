  <style>
    .catalog-page {
      padding: 100px 0 80px;
      min-height: 100vh;
    }

    .catalog-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .catalog-header h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      margin-bottom: 8px;
    }

    .catalog-header p {
      color: var(--text-muted);
      font-size: 1.1rem;
    }

    .catalog-controls {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      align-items: center;
    }

    .catalog-search {
      flex: 1;
      min-width: 200px;
      font-family: var(--font-body);
      font-size: 1rem;
      padding: 12px 16px;
      background: var(--bg-surface);
      border: 2px solid var(--border);
      border-radius: 0;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .catalog-search::placeholder {
      color: var(--text-muted);
    }

    .catalog-search:focus {
      border-color: var(--accent);
    }

    .catalog-search:focus-visible,
    .catalog-filter:focus-visible {
      outline: 2px solid var(--blueprint);
      outline-offset: 2px;
    }

    .catalog-filter {
      font-family: var(--font-body);
      font-size: 1rem;
      padding: 12px 16px;
      background: var(--bg-surface);
      border: 2px solid var(--border);
      border-radius: 0;
      color: var(--text);
      outline: none;
      cursor: pointer;
      -webkit-appearance: none;
      appearance: none;
    }

    .catalog-count {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .catalog-table-wrap {
      overflow-x: auto;
      border: 2px solid var(--border);
      border-radius: 12px;
      background: var(--bg-surface);
    }

    .catalog-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
      min-width: 640px;
    }

    .catalog-table th {
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 0.9rem;
      text-align: left;
      padding: 14px 16px;
      border-bottom: 2px solid var(--border);
      color: var(--text-muted);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
      transition: color 0.2s;
    }

    .catalog-table th:hover {
      color: var(--accent);
    }

    .catalog-table th .sort-arrow {
      font-size: 0.7rem;
      margin-left: 4px;
    }

    .catalog-table td {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    .catalog-table tr:last-child td {
      border-bottom: none;
    }

    .catalog-table tr:hover td {
      background: var(--bg-surface-hover);
    }

    .catalog-table a {
      color: var(--secondary);
    }

    .catalog-table a:hover {
      color: var(--accent);
    }

    .catalog-status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
    }

    .catalog-status-dot.complete {
      background: var(--complete);
    }

    .catalog-status-dot.planned {
      background: var(--planned);
    }

    .catalog-status-dot.in-progress {
      background: var(--planned);
    }

    .catalog-lang {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .catalog-phase-label {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--accent);
    }

    .catalog-empty {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-muted);
      font-size: 1.1rem;
    }

    @media (max-width: 768px) {
      .catalog-page {
        padding: 80px 0 48px;
      }

      .catalog-controls {
        flex-direction: column;
      }

      .catalog-filter {
        width: 100%;
      }

      .catalog-table {
        font-size: 0.85rem;
      }

      .catalog-table th,
      .catalog-table td {
        padding: 8px 10px;
      }
    }
  </style>

  <main class="catalog-page" id="main">

      </div>
      <div class="catalog-controls">

          <option value="">全部阶段</option>

  <script>
    (function () {
      var root = document.documentElement;
      var stored = localStorage.getItem('theme');
      if (stored) {
        root.setAttribute('data-theme', stored);
      } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        root.setAttribute('data-theme', 'dark');
      } else {
        root.setAttribute('data-theme', 'light');
      }

      function updateIcon() {
        var icon = document.getElementById('themeIcon');
        if (!icon) return;
        var theme = root.getAttribute('data-theme');
        icon.textContent = theme === 'light' ? '☾' : '☼';
        var btn = document.getElementById('themeToggle');
        if (btn) {
          btn.setAttribute('aria-label', theme === 'light' ? '切换到深色模式' : '切换到浅色模式');
          btn.setAttribute('title', theme === 'light' ? '切换到深色模式' : '切换到浅色模式');
        }
      }

      updateIcon();

      document.addEventListener('DOMContentLoaded', function () {
        updateIcon();

        var btn = document.getElementById('themeToggle');
        if (btn) {
          btn.addEventListener('click', function () {
            var next = root.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            root.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            updateIcon();
          });
        }

        var allRows = [];
        var phaseSelect = document.getElementById('catalogPhase');

        for (var i = 0; i < PHASES.length; i++) {
          var p = PHASES[i];
          var opt = document.createElement('option');
          opt.value = String(p.id);
          opt.textContent = String(p.id).padStart(2, '0') + ' - ' + (p.nameZh || p.name);
          phaseSelect.appendChild(opt);

          for (var j = 0; j < p.lessons.length; j++) {
            var l = p.lessons[j];
            allRows.push({
              phase: p.id,
              phaseName: p.nameZh || p.name,
              name: l.nameZh || l.name,
              type: l.type,
              typeLabel: typeLabel(l.type),
              lang: l.lang,
              status: l.status,
              statusLabel: statusLabel(l.status),
              url: l.url || ''
            });
          }
        }

        var searchInput = document.getElementById('catalogSearch');
        var statusSelect = document.getElementById('catalogStatus');
        var bodyEl = document.getElementById('catalogBody');
        var countEl = document.getElementById('catalogCount');
        var sortCol = 'phase';
        var sortDir = 1;

        function escapeHtml(str) {
          var div = document.createElement('div');
          div.textContent = str;
          return div.innerHTML;
        }

        function lessonPathFromUrl(url) {
          var m = url ? url.match(/(phases\/[^/]+\/[^/]+)\/?$/) : null;
          return m ? m[1] : '';
        }

        function localLessonHref(url) {
          var path = lessonPathFromUrl(url);
          return path ? 'lesson.html?path=' + encodeURIComponent(path) + '&lang=zh-CN' : '';
        }

        function typeLabel(type) {
          var labels = { Build: '构建', Learn: '学习', Reference: '参考', Capstone: '综合' };
          return labels[type] || type || '';
        }

        function statusLabel(status) {
          var labels = { complete: '已完成', 'in-progress': '进行中', planned: '计划中' };
          return labels[status] || status || '';
        }

        function render() {
          var query = (searchInput.value || '').toLowerCase().trim();
          var phaseFilter = phaseSelect.value;
          var statusFilter = statusSelect.value;

          var rows = allRows.filter(function (r) {
            if (phaseFilter && String(r.phase) !== phaseFilter) return false;
            if (statusFilter && r.status !== statusFilter) return false;
            if (query) {
              return r.name.toLowerCase().indexOf(query) !== -1 ||
                r.phaseName.toLowerCase().indexOf(query) !== -1 ||
                r.type.toLowerCase().indexOf(query) !== -1 ||
                r.lang.toLowerCase().indexOf(query) !== -1;
            }
            return true;
          });

          rows.sort(function (a, b) {
            var va, vb;
            if (sortCol === 'phase') {
              va = a.phase;
              vb = b.phase;
            } else if (sortCol === 'name') {
              va = a.name.toLowerCase();
              vb = b.name.toLowerCase();
            } else if (sortCol === 'type') {
              va = a.type.toLowerCase();
              vb = b.type.toLowerCase();
            } else if (sortCol === 'lang') {
              va = a.lang.toLowerCase();
              vb = b.lang.toLowerCase();
            } else if (sortCol === 'status') {
              va = a.status;
              vb = b.status;
            }
            if (va < vb) return -1 * sortDir;
            if (va > vb) return 1 * sortDir;
            return 0;
          });

          countEl.textContent = '显示 ' + rows.length + ' / ' + allRows.length + ' 节课程';

          if (rows.length === 0) {
            bodyEl.innerHTML = '<tr><td colspan="5" class="catalog-empty">没有课程匹配当前筛选。</td></tr>';
            return;
          }

          var html = '';
          for (var i = 0; i < rows.length; i++) {
            var r = rows[i];
            html += '<tr>';
            html += '<td><span class="catalog-phase-label">' + String(r.phase).padStart(2, '0') + '</span></td>';
            var href = localLessonHref(r.url);
            if (href) {
              html += '<td><a href="' + href + '">' + escapeHtml(r.name) + '</a></td>';
            } else {
              html += '<td>' + escapeHtml(r.name) + '</td>';
            }
            html += '<td>' + escapeHtml(r.typeLabel) + '</td>';
            html += '<td><span class="catalog-lang">' + escapeHtml(r.lang) + '</span></td>';
            html += '<td><span class="catalog-status-dot ' + r.status + '"></span>' + escapeHtml(r.statusLabel) + '</td>';
            html += '</tr>';
          }
          bodyEl.innerHTML = html;
        }

        var urlQuery = new URLSearchParams(window.location.search).get('q');
        if (urlQuery) {
          searchInput.value = urlQuery;
          try { searchInput.setSelectionRange(urlQuery.length, urlQuery.length); } catch (_) {}
          try { searchInput.focus({ preventScroll: true }); } catch (_) { searchInput.focus(); }
        }

        searchInput.addEventListener('input', render);
        phaseSelect.addEventListener('change', render);
        statusSelect.addEventListener('change', render);

        document.querySelectorAll('.catalog-table th[data-sort]').forEach(function (th) {
          th.addEventListener('click', function () {
            var col = th.getAttribute('data-sort');
            if (sortCol === col) {
              sortDir = sortDir * -1;
            } else {
              sortCol = col;
              sortDir = 1;
            }
            document.querySelectorAll('.catalog-table th .sort-arrow').forEach(function (a) {
              a.textContent = '';
            });
            th.querySelector('.sort-arrow').textContent = sortDir === 1 ? ' \u25B2' : ' \u25BC';
            render();
          });
        });

        render();
      });
    })();
  </script>
